<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Quick Tester 🧪</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 16px;
    }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 20px; text-align: center; }
    h1 span { font-size: 2rem; }
    
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #a0a0c0; }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 14px;
      margin-bottom: 12px;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #00d4ff;
    }
    
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }
    
    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      color: #000;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,212,255,0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.2); }
    
    .presets { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .preset {
      padding: 8px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #a0a0c0;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .preset:hover { background: rgba(0,212,255,0.2); border-color: #00d4ff; }
    
    .response {
      background: #0d1117;
      border-radius: 10px;
      padding: 16px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 12px;
      max-height: 300px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .response.success { border: 1px solid #00ff88; }
    .response.error { border: 1px solid #ff4444; }
    
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 12px;
    }
    .status.loading { background: rgba(255,200,0,0.2); }
    .status.success { background: rgba(0,255,136,0.2); }
    .status.error { background: rgba(255,68,68,0.2); }
    
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .headers-list { margin-top: 8px; }
    .header-item {
      display: flex; gap: 8px; margin-bottom: 8px;
    }
    .header-item input { margin: 0; }
    
    .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .tab {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #a0a0c0;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
    }
    .tab.active {
      background: rgba(0,212,255,0.2);
      border-color: #00d4ff;
      color: #00d4ff;
    }
    
    .history { margin-top: 16px; }
    .history-item {
      padding: 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 12px;
    }
    .history-item:hover { background: rgba(255,255,255,0.1); }
    .history-method { 
      display: inline-block; padding: 2px 8px; 
      border-radius: 4px; margin-left: 8px;
      font-weight: bold;
    }
    .method-GET { background: #00ff88; color: #000; }
    .method-POST { background: #ffaa00; color: #000; }
    .method-DELETE { background: #ff4444; color: #fff; }
    .method-PUT { background: #00aaff; color: #fff; }
    
    .code-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: bold;
      margin-left: 10px;
    }
    .code-2xx { background: #00ff88; color: #000; }
    .code-4xx { background: #ffaa00; color: #000; }
    .code-5xx { background: #ff4444; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 API Quick Tester</h1>
    
    <div class="card">
      <div class="tabs">
        <div class="tab active" data-method="GET">GET</div>
        <div class="tab" data-method="POST">POST</div>
        <div class="tab" data-method="PUT">PUT</div>
        <div class="tab" data-method="DELETE">DELETE</div>
      </div>
      
      <label>URL</label>
      <input type="text" id="url" placeholder="https://api.example.com/endpoint">
      
      <div class="presets">
        <div class="preset" data-url="https://moltbook.com/api/v1/home">Moltbook Home</div>
        <div class="preset" data-url="https://api.github.com">GitHub API</div>
        <div class="preset" data-url="https://httpbin.org/get">HTTPBin GET</div>
        <div class="preset" data-url="https://httpbin.org/post">HTTPBin POST</div>
        <div class="preset" data-url="https://api.coingecko.com/api/v3/ping">CoinGecko</div>
        <div class="preset" data-url="https://api.exchangerate-api.com/v4/latest/USD">Exchange Rates</div>
      </div>
      
      <label>Headers</label>
      <div class="headers-list" id="headersList">
        <div class="header-item">
          <input type="text" placeholder="Header Name" class="header-key" value="Content-Type">
          <input type="text" placeholder="Value" class="header-value" value="application/json">
        </div>
      </div>
      <button class="btn-secondary" onclick="addHeader()" style="margin-bottom: 16px;">+ إضافة Header</button>
      
      <label>Body (JSON)</label>
      <textarea id="body" rows="4" placeholder='{"key": "value"}'></textarea>
      
      <button class="btn-primary" id="sendBtn" onclick="sendRequest()">🚀 إرسال الطلب</button>
    </div>
    
    <div class="card" id="responseCard" style="display: none;">
      <div class="status" id="status">
        <div class="spinner" id="spinner"></div>
        <span id="statusText">جاري الإرسال...</span>
        <span class="code-badge" id="statusCode" style="display: none;"></span>
      </div>
      <label>Response</label>
      <div class="response" id="response"></div>
    </div>
    
    <div class="card history">
      <label>📜 السجل الأخير</label>
      <div id="historyList"></div>
    </div>
  </div>
  
  <script>
    let currentMethod = 'GET';
    let history = JSON.parse(localStorage.getItem('apiTesterHistory') || '[]');
    
    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentMethod = tab.dataset.method;
      });
    });
    
    // Presets
    document.querySelectorAll('.preset').forEach(p => {
      p.addEventListener('click', () => {
        document.getElementById('url').value = p.dataset.url;
      });
    });
    
    // Headers
    function addHeader() {
      const div = document.createElement('div');
      div.className = 'header-item';
      div.innerHTML = `
        <input type="text" placeholder="Header Name" class="header-key">
        <input type="text" placeholder="Value" class="header-value">
      `;
      document.getElementById('headersList').appendChild(div);
    }
    
    function getHeaders() {
      const headers = {};
      document.querySelectorAll('.header-item').forEach(item => {
        const key = item.querySelector('.header-key').value.trim();
        const value = item.querySelector('.header-value').value.trim();
        if (key) headers[key] = value;
      });
      return headers;
    }
    
    async function sendRequest() {
      const url = document.getElementById('url').value.trim();
      const body = document.getElementById('body').value.trim();
      const btn = document.getElementById('sendBtn');
      const responseCard = document.getElementById('responseCard');
      const responseDiv = document.getElementById('response');
      const statusDiv = document.getElementById('status');
      const statusText = document.getElementById('statusText');
      const statusCode = document.getElementById('statusCode');
      const spinner = document.getElementById('spinner');
      
      if (!url) {
        alert('الرجاء إدخال URL');
        return;
      }
      
      btn.disabled = true;
      btn.textContent = '⏳ جاري الإرسال...';
      responseCard.style.display = 'block';
      statusDiv.className = 'status loading';
      statusDiv.style.display = 'flex';
      spinner.style.display = 'block';
      statusText.textContent = 'جاري الإرسال...';
      statusCode.style.display = 'none';
      responseDiv.textContent = '';
      responseDiv.className = 'response';
      
      const options = {
        method: currentMethod,
        headers: getHeaders()
      };
      
      if (body && (currentMethod === 'POST' || currentMethod === 'PUT')) {
        try {
          options.body = JSON.stringify(JSON.parse(body));
        } catch(e) {
          options.body = body;
        }
      }
      
      const startTime = Date.now();
      
      try {
        const res = await fetch(url, options);
        const duration = Date.now() - startTime;
        const contentType = res.headers.get('content-type') || '';
        
        let data;
        if (contentType.includes('application/json')) {
          data = await res.json();
          responseDiv.textContent = JSON.stringify(data, null, 2);
        } else {
          data = await res.text();
          responseDiv.textContent = data;
        }
        
        statusDiv.className = 'status success';
        spinner.style.display = 'none';
        statusText.textContent = `✅ نجح في ${duration}ms`;
        statusCode.textContent = res.status;
        statusCode.style.display = 'inline-block';
        statusCode.className = 'code-badge ' + (res.status < 400 ? 'code-2xx' : res.status < 500 ? 'code-4xx' : 'code-5xx');
        responseDiv.className = 'response success';
        
        // Add to history
        addToHistory(currentMethod, url, res.status, duration);
        
      } catch (err) {
        statusDiv.className = 'status error';
        spinner.style.display = 'none';
        statusText.textContent = '❌ فشل';
        responseDiv.textContent = err.message;
        responseDiv.className = 'response error';
        addToHistory(currentMethod, url, 'ERR', 0);
      }
      
      btn.disabled = false;
      btn.textContent = '🚀 إرسال الطلب';
    }
    
    function addToHistory(method, url, status, duration) {
      history.unshift({ method, url, status, duration, time: new Date().toLocaleTimeString() });
      history = history.slice(0, 10);
      localStorage.setItem('apiTesterHistory', JSON.stringify(history));
      renderHistory();
    }
    
    function renderHistory() {
      const list = document.getElementById('historyList');
      if (history.length === 0) {
        list.innerHTML = '<div style="color: #666; text-align: center;">لا توجد طلبات سابقة</div>';
        return;
      }
      list.innerHTML = history.map((h, i) => `
        <div class="history-item" onclick="loadFromHistory(${i})">
          <span class="history-method method-${h.method}">${h.method}</span>
          <span style="color: #888;">${h.time}</span>
          <span style="float: left; color: ${h.status === 'ERR' ? '#ff4444' : h.status < 400 ? '#00ff88' : '#ffaa00'}">
            ${h.status === 'ERR' ? 'ERR' : h.status} ${h.duration ? `(${h.duration}ms)` : ''}
          </span>
          <br><small style="color: #666; word-break: break-all;">${h.url}</small>
        </div>
      `).join('');
    }
    
    function loadFromHistory(i) {
      const h = history[i];
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.method === h.method);
      });
      currentMethod = h.method;
      document.getElementById('url').value = h.url;
    }
    
    renderHistory();
  </script>
</body>
</html>
