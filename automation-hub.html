<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔄 Automation Hub — هادي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            color: #e0e0e0;
            padding: 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 2rem 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #999;
            font-size: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: #999;
            font-size: 0.9rem;
        }

        .section {
            background: rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .automation-item {
            background: rgba(255,255,255,0.03);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            border-left: 4px solid;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .automation-item.active {
            border-color: #10b981;
        }

        .automation-item.inactive {
            border-color: #6b7280;
        }

        .automation-item.error {
            border-color: #ef4444;
        }

        .automation-info {
            flex: 1;
            min-width: 200px;
        }

        .automation-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .automation-desc {
            color: #999;
            font-size: 0.9rem;
        }

        .automation-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .badge.success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .badge.warning {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .badge.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .badge.neutral {
            background: rgba(107, 114, 128, 0.2);
            color: #9ca3af;
        }

        .timeline {
            position: relative;
            padding-right: 2rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(255,255,255,0.1);
        }

        .timeline-item {
            position: relative;
            padding-bottom: 1.5rem;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            right: -6px;
            top: 6px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #667eea;
            border: 2px solid #0f0f23;
        }

        .timeline-time {
            color: #667eea;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .timeline-content {
            color: #e0e0e0;
            font-size: 0.95rem;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: 600;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .automation-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 0.5rem;
            animation: pulse 2s infinite;
        }

        .status-indicator.online {
            background: #10b981;
        }

        .status-indicator.offline {
            background: #6b7280;
        }

        .status-indicator.error {
            background: #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .last-updated {
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔄 Automation Hub</h1>
            <p class="subtitle">مركز التحكم بكل الأتمتة — كل شي في مكان واحد</p>
            <button class="refresh-btn" onclick="refreshData()">🔄 تحديث</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-automations">—</div>
                <div class="stat-label">إجمالي Automations</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="active-count">—</div>
                <div class="stat-label">نشط الآن</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="error-count">—</div>
                <div class="stat-label">أخطاء</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="last-run">—</div>
                <div class="stat-label">آخر تشغيل</div>
            </div>
        </div>

        <div class="grid-2">
            <div class="section">
                <h2 class="section-title">⏰ Cron Jobs</h2>
                <div id="cron-list"></div>
            </div>

            <div class="section">
                <h2 class="section-title">💓 Heartbeat Tasks</h2>
                <div id="heartbeat-list"></div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">📜 Activity Timeline</h2>
            <div class="timeline" id="timeline"></div>
        </div>

        <div class="section">
            <h2 class="section-title">🔧 Scripts & Tools</h2>
            <div id="scripts-list"></div>
        </div>

        <div class="last-updated">آخر تحديث: <span id="last-update-time">—</span></div>
    </div>

    <script>
        const cronJobs = [
            { name: "🏭 Night Build", schedule: "02:00", status: "active", model: "Sonnet 4.5", desc: "بناء أدوات وصفحات جديدة كل ليلة" },
            { name: "📊 القوائم المالية", schedule: "03:00 (الجمعة)", status: "active", model: "MiniMax Direct", desc: "تحديث بيانات S&P Global للأسهم" },
            { name: "💡 تغذية الاقتراحات", schedule: "06:00", status: "active", model: "MiniMax Direct", desc: "HN + Reddit + GitHub + dev.to" },
            { name: "☀️ صباحي", schedule: "07:30", status: "active", model: "MiniMax Direct", desc: "Night Build + إيميلات + تقويم" },
            { name: "📊 اقتصادي", schedule: "08:15", status: "active", model: "MiniMax Direct", desc: "كفالة + مؤشرات" },
            { name: "📈 أسهم صباحي", schedule: "10:20 (أحد-خميس)", status: "active", model: "MiniMax Direct", desc: "تحديث أسعار الأسهم" },
            { name: "🤖 تقني", schedule: "12:00", status: "active", model: "MiniMax Direct", desc: "Moltbook + أخبار + أفكار" },
            { name: "📈 أسهم عصري", schedule: "15:30 (أحد-خميس)", status: "active", model: "MiniMax Direct", desc: "تحديث أسعار الأسهم" },
            { name: "🌙 مسائي", schedule: "21:00", status: "active", model: "MiniMax Direct", desc: "ملخص + تشويق Night Build" }
        ];

        const heartbeatTasks = [
            { name: "🔒 Security Check", desc: "فحص SOUL.md + AGENTS.md", status: "active" },
            { name: "📧 Email Scan", desc: "فحص الإيميلات المهمة", status: "active" },
            { name: "📅 Calendar Check", desc: "مواعيد خلال 24-48 ساعة", status: "active" },
            { name: "🛠️ Cron Errors", desc: "فحص أخطاء Cron Jobs", status: "active" },
            { name: "💾 Memory Update", desc: "تحديث MEMORY.md من الـ daily files", status: "active" }
        ];

        const scripts = [
            { name: "ideas-api.js", desc: "API Server (port 48100)", status: "online" },
            { name: "update-dashboard.sh", desc: "تحديث الرصيد والتكاليف", status: "active" },
            { name: "update-agents-status.sh", desc: "تحديث حالة الوكلاء", status: "active" },
            { name: "doit-watcher.sh", desc: "مراقبة عمود Do It + تنبيه", status: "active" },
            { name: "integrity-check.sh", desc: "فحص hash للملفات المحمية", status: "active" },
            { name: "video-gen.sh", desc: "توليد فيديو (Sora 2)", status: "active" }
        ];

        function renderCronJobs() {
            const container = document.getElementById('cron-list');
            container.innerHTML = cronJobs.map(job => `
                <div class="automation-item ${job.status}">
                    <div class="automation-info">
                        <div class="automation-name">${job.name}</div>
                        <div class="automation-desc">${job.desc}</div>
                    </div>
                    <div class="automation-meta">
                        <span class="badge neutral">${job.schedule}</span>
                        <span class="badge success">${job.model}</span>
                        <span class="status-indicator ${job.status}"></span>
                    </div>
                </div>
            `).join('');
        }

        function renderHeartbeats() {
            const container = document.getElementById('heartbeat-list');
            container.innerHTML = heartbeatTasks.map(task => `
                <div class="automation-item ${task.status}">
                    <div class="automation-info">
                        <div class="automation-name">${task.name}</div>
                        <div class="automation-desc">${task.desc}</div>
                    </div>
                    <div class="automation-meta">
                        <span class="badge success">كل 30 دقيقة</span>
                        <span class="status-indicator ${task.status}"></span>
                    </div>
                </div>
            `).join('');
        }

        function renderScripts() {
            const container = document.getElementById('scripts-list');
            container.innerHTML = scripts.map(script => `
                <div class="automation-item ${script.status}">
                    <div class="automation-info">
                        <div class="automation-name">${script.name}</div>
                        <div class="automation-desc">${script.desc}</div>
                    </div>
                    <div class="automation-meta">
                        <span class="badge ${script.status === 'online' ? 'success' : 'neutral'}">${script.status === 'online' ? 'Running' : 'Ready'}</span>
                        <span class="status-indicator ${script.status === 'online' ? 'online' : 'active'}"></span>
                    </div>
                </div>
            `).join('');
        }

        function renderTimeline() {
            const now = new Date();
            const timeline = [];
            
            // محاكاة آخر 5 أحداث
            const events = [
                { time: "07:30", desc: "🌅 تقرير صباحي: Night Build result + إيميلات + تقويم" },
                { time: "06:00", desc: "💡 تغذية الاقتراحات: أضيف 12 فكرة جديدة" },
                { time: "02:00", desc: "🏭 Night Build: بنى Automation Hub" },
                { time: "21:00 (أمس)", desc: "🌙 تقرير مسائي: ملخص + تشويق Night Build" },
                { time: "15:30 (أمس)", desc: "📈 تحديث أسعار الأسهم (عصري)" }
            ];

            const container = document.getElementById('timeline');
            container.innerHTML = events.map(event => `
                <div class="timeline-item">
                    <div class="timeline-time">${event.time}</div>
                    <div class="timeline-content">${event.desc}</div>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('total-automations').textContent = cronJobs.length + heartbeatTasks.length + scripts.length;
            document.getElementById('active-count').textContent = cronJobs.filter(j => j.status === 'active').length + heartbeatTasks.length + scripts.filter(s => s.status !== 'error').length;
            document.getElementById('error-count').textContent = '0';
            document.getElementById('last-run').textContent = 'منذ دقائق';
            document.getElementById('last-update-time').textContent = new Date().toLocaleString('ar-SA', {
                dateStyle: 'medium',
                timeStyle: 'short'
            });
        }

        function refreshData() {
            renderCronJobs();
            renderHeartbeats();
            renderScripts();
            renderTimeline();
            updateStats();
        }

        // تحميل أولي
        refreshData();

        // تحديث تلقائي كل دقيقة
        setInterval(refreshData, 60000);
    </script>
</body>
</html>
