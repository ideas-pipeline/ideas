<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Night Mini Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Tajawal', Arial, sans-serif; background: #10172b; color: #fff; margin: 0; padding: 0; }
    .container { max-width: 440px; margin: 40px auto; background: #182042; border-radius: 18px; border: 1.5px solid #384166; box-shadow: 0 3px 16px #0001; padding: 26px 24px 18px 24px; }
    h2 { margin-top: 0; font-weight: 800; color: #ffde7e; font-size: 2.1em; }
    .row { margin: 20px 0 12px; display: flex; justify-content: space-between; align-items: center; }
    .label { font-weight: 600; color: #bfc4d5; font-size: 1.1em; }
    .value { font-weight: 700; color: #51d4a0; font-size: 1.3em; }
    .note { color: #f8c430; background: #23274a; border-radius: 8px; padding: 5px 7px 3px 7px; font-size: 1em; margin: 18px 0 8px; display: inline-block; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Mini Dashboard</h2>
    <div class="row">
      <span class="label">إصدار OpenClaw</span>
      <span class="value">2026.2.23</span>
    </div>
    <div class="row">
      <span class="label">آخر إصدار متاح</span>
      <span class="value">2026.2.26</span>
    </div>
    <div class="row">
      <span class="label">استهلاك القرص</span>
      <span class="value">41GB / 96GB</span>
    </div>
    <div class="row">
      <span class="label">ملفات الذاكرة</span>
      <span class="value">8</span>
    </div>
    <span class="note">صفحة تجريبية لعرض مؤشرات النظام ✦ تحديث تلقائي ليلي</span>
  </div>
</body>
</html>
