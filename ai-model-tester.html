<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Model Tester — مقارنة النماذج</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      direction: rtl;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    h1 {
      text-align: center;
      color: #667eea;
      margin-bottom: 10px;
      font-size: 2.5em;
    }
    
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 1.1em;
    }
    
    .input-section {
      margin-bottom: 30px;
    }
    
    label {
      display: block;
      margin-bottom: 10px;
      font-weight: bold;
      color: #333;
    }
    
    textarea {
      width: 100%;
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      resize: vertical;
      min-height: 120px;
      transition: border-color 0.3s;
    }
    
    textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .models-section {
      margin-bottom: 30px;
    }
    
    .model-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .model-card {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.3s;
      position: relative;
    }
    
    .model-card:hover {
      background: #e9ecef;
      transform: translateY(-2px);
    }
    
    .model-card.selected {
      background: #667eea;
      color: white;
      border-color: #5568d3;
    }
    
    .model-card input[type="checkbox"] {
      display: none;
    }
    
    .model-name {
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .model-info {
      font-size: 0.85em;
      opacity: 0.8;
    }
    
    .model-card.selected .model-info {
      opacity: 0.9;
    }
    
    .test-button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
      margin-bottom: 30px;
    }
    
    .test-button:hover {
      transform: scale(1.02);
    }
    
    .test-button:active {
      transform: scale(0.98);
    }
    
    .test-button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
    }
    
    .result-card {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 10px;
      border: 2px solid #ddd;
    }
    
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #ddd;
    }
    
    .result-model {
      font-weight: bold;
      color: #667eea;
      font-size: 1.1em;
    }
    
    .result-time {
      color: #666;
      font-size: 0.9em;
    }
    
    .result-content {
      white-space: pre-wrap;
      line-height: 1.6;
      color: #333;
      max-height: 400px;
      overflow-y: auto;
      padding: 10px;
      background: white;
      border-radius: 5px;
    }
    
    .loading {
      text-align: center;
      color: #667eea;
      font-size: 1.2em;
      padding: 40px;
    }
    
    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 10px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .error {
      background: #fee;
      color: #c00;
      padding: 15px;
      border-radius: 10px;
      border: 2px solid #fcc;
    }
    
    .stats {
      display: flex;
      justify-content: space-around;
      margin-top: 15px;
      padding: 10px;
      background: white;
      border-radius: 5px;
      font-size: 0.85em;
    }
    
    .stat-item {
      text-align: center;
    }
    
    .stat-label {
      color: #666;
      font-size: 0.9em;
    }
    
    .stat-value {
      font-weight: bold;
      color: #667eea;
    }
    
    @media (max-width: 768px) {
      h1 {
        font-size: 1.8em;
      }
      
      .results-grid {
        grid-template-columns: 1fr;
      }
      
      .model-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 AI Model Tester</h1>
    <p class="subtitle">قارن ردود النماذج المختلفة على نفس السؤال</p>
    
    <div class="input-section">
      <label for="prompt">أدخل السؤال أو Prompt:</label>
      <textarea id="prompt" placeholder="مثال: اكتب قصة قصيرة عن روبوت يتعلم الشعر..."></textarea>
    </div>
    
    <div class="models-section">
      <label>اختر النماذج للمقارنة (1-6):</label>
      <div class="model-grid" id="modelGrid"></div>
    </div>
    
    <button class="test-button" id="testBtn" onclick="runTest()">🚀 ابدأ المقارنة</button>
    
    <div class="results-grid" id="resultsGrid"></div>
  </div>

  <script>
    const models = [
      {
        id: 'gpt-4.1',
        name: 'GPT-4.1',
        provider: 'openrouter/openai/gpt-4.1',
        info: '$2/M input · $8/M output · سريع ودقيق',
        color: '#10a37f'
      },
      {
        id: 'gpt-5-mini',
        name: 'GPT-5 Mini',
        provider: 'openrouter/openai/gpt-5-mini',
        info: '$0.20/M input · $0.50/M output · اقتصادي',
        color: '#10a37f'
      },
      {
        id: 'claude-opus',
        name: 'Claude Opus 4.6',
        provider: 'openrouter/anthropic/claude-opus-4.6',
        info: '$15/M input · $75/M output · قوي للتفكير',
        color: '#ca822a'
      },
      {
        id: 'claude-sonnet',
        name: 'Claude Sonnet 4.5',
        provider: 'openrouter/anthropic/claude-sonnet-4.5',
        info: '$3/M input · $15/M output · متوازن',
        color: '#ca822a'
      },
      {
        id: 'gemini-3.1',
        name: 'Gemini 3.1 Pro Preview',
        provider: 'openrouter/google/gemini-3.1-pro-preview',
        info: '$1.25/M input · $5/M output · من Google',
        color: '#4285f4'
      },
      {
        id: 'minimax',
        name: 'MiniMax M2.5',
        provider: 'openrouter/minimax/minimax-m2.5',
        info: '$2/M input · $10/M output · صيني متقدم',
        color: '#ff6b6b'
      }
    ];
    
    const selectedModels = new Set();
    
    // رسم بطاقات النماذج
    function renderModels() {
      const grid = document.getElementById('modelGrid');
      grid.innerHTML = models.map(model => `
        <div class="model-card" onclick="toggleModel('${model.id}')" id="card-${model.id}">
          <input type="checkbox" id="model-${model.id}">
          <div class="model-name">${model.name}</div>
          <div class="model-info">${model.info}</div>
        </div>
      `).join('');
      
      // اختيار GPT-4.1 و Claude Sonnet افتراضياً
      toggleModel('gpt-4.1');
      toggleModel('claude-sonnet');
    }
    
    function toggleModel(modelId) {
      const card = document.getElementById(`card-${modelId}`);
      const checkbox = document.getElementById(`model-${modelId}`);
      
      if (selectedModels.has(modelId)) {
        selectedModels.delete(modelId);
        card.classList.remove('selected');
        checkbox.checked = false;
      } else {
        if (selectedModels.size >= 6) {
          alert('يمكنك اختيار 6 نماذج كحد أقصى');
          return;
        }
        selectedModels.add(modelId);
        card.classList.add('selected');
        checkbox.checked = true;
      }
    }
    
    async function callModel(model, prompt) {
      const startTime = Date.now();
      
      try {
        // ⚠️ ملاحظة: هذا كود تجريبي — في الإنتاج يحتاج backend حقيقي
        // هنا نستخدم OpenRouter API مباشرة (يحتاج API key)
        
        // محاكاة الرد (في الإنتاج: استبدل بـ API call حقيقي)
        const response = await simulateAPICall(model, prompt);
        
        const endTime = Date.now();
        const duration = ((endTime - startTime) / 1000).toFixed(2);
        
        return {
          success: true,
          content: response,
          duration: duration,
          tokens: Math.floor(Math.random() * 500) + 100 // محاكاة
        };
      } catch (error) {
        const endTime = Date.now();
        const duration = ((endTime - startTime) / 1000).toFixed(2);
        
        return {
          success: false,
          error: error.message,
          duration: duration
        };
      }
    }
    
    // محاكاة API call (في الإنتاج: استبدل بـ fetch حقيقي)
    async function simulateAPICall(model, prompt) {
      // انتظار عشوائي (1-4 ثانية) لمحاكاة الشبكة
      const delay = Math.random() * 3000 + 1000;
      await new Promise(resolve => setTimeout(resolve, delay));
      
      // ردود محاكاة مختلفة لكل نموذج
      const responses = {
        'gpt-4.1': `جواب من GPT-4.1:\n\n${prompt}\n\nهذا نموذج سريع ودقيق، معروف بتوازنه الجيد بين التكلفة والأداء. يُستخدم في معظم التطبيقات اليومية.`,
        'gpt-5-mini': `جواب من GPT-5 Mini:\n\n${prompt}\n\nنموذج اقتصادي، أسرع من GPT-4.1 لكن أقل دقة في المهام المعقدة. مناسب للردود السريعة والمهام البسيطة.`,
        'claude-opus': `جواب من Claude Opus 4.6:\n\n${prompt}\n\nهذا النموذج متخصص في التفكير العميق والتحليل. يعطي ردود مفصلة ودقيقة جداً، لكنه الأغلى سعراً. مناسب للمهام الحرجة.`,
        'claude-sonnet': `جواب من Claude Sonnet 4.5:\n\n${prompt}\n\nنموذج متوازن من Anthropic، أقل تكلفة من Opus ولكن أداؤه ممتاز. مناسب للبناء والكتابة الإبداعية.`,
        'gemini-3.1': `جواب من Gemini 3.1 Pro:\n\n${prompt}\n\nنموذج Google القوي، جيد في المهام المتعددة اللغات ومعالجة البيانات. سعره تنافسي ويدعم context طويل.`,
        'minimax': `جواب من MiniMax M2.5:\n\n${prompt}\n\nنموذج صيني متقدم، قوي في اللغة العربية والصينية. أداؤه ممتاز لكن أحياناً يخلط اللغات في الرد.`
      };
      
      return responses[model.id] || `رد تجريبي من ${model.name}`;
    }
    
    async function runTest() {
      const prompt = document.getElementById('prompt').value.trim();
      
      if (!prompt) {
        alert('الرجاء إدخال سؤال أو prompt');
        return;
      }
      
      if (selectedModels.size === 0) {
        alert('الرجاء اختيار نموذج واحد على الأقل');
        return;
      }
      
      const resultsGrid = document.getElementById('resultsGrid');
      const testBtn = document.getElementById('testBtn');
      
      // تعطيل الزر
      testBtn.disabled = true;
      testBtn.textContent = '⏳ جاري الاختبار...';
      
      // مسح النتائج السابقة
      resultsGrid.innerHTML = '';
      
      // إضافة بطاقات loading
      selectedModels.forEach(modelId => {
        const model = models.find(m => m.id === modelId);
        resultsGrid.innerHTML += `
          <div class="result-card" id="result-${modelId}">
            <div class="result-header">
              <div class="result-model">${model.name}</div>
              <div class="result-time">⏱️ --</div>
            </div>
            <div class="loading">
              <div class="spinner"></div>
              <div>جاري الانتظار...</div>
            </div>
          </div>
        `;
      });
      
      // تشغيل كل النماذج بالتوازي
      const promises = Array.from(selectedModels).map(async modelId => {
        const model = models.find(m => m.id === modelId);
        const result = await callModel(model, prompt);
        
        const card = document.getElementById(`result-${modelId}`);
        
        if (result.success) {
          card.innerHTML = `
            <div class="result-header">
              <div class="result-model">${model.name}</div>
              <div class="result-time">⏱️ ${result.duration}s</div>
            </div>
            <div class="result-content">${result.content}</div>
            <div class="stats">
              <div class="stat-item">
                <div class="stat-label">الوقت</div>
                <div class="stat-value">${result.duration}s</div>
              </div>
              <div class="stat-item">
                <div class="stat-label">Tokens</div>
                <div class="stat-value">~${result.tokens}</div>
              </div>
            </div>
          `;
        } else {
          card.innerHTML = `
            <div class="result-header">
              <div class="result-model">${model.name}</div>
              <div class="result-time">❌ فشل</div>
            </div>
            <div class="error">
              <strong>خطأ:</strong> ${result.error}
            </div>
          `;
        }
      });
      
      // انتظار اكتمال كل النماذج
      await Promise.all(promises);
      
      // إعادة تفعيل الزر
      testBtn.disabled = false;
      testBtn.textContent = '🚀 ابدأ المقارنة';
    }
    
    // تهيئة عند التحميل
    renderModels();
  </script>
</body>
</html>
