<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مقارنة أداء الشركات</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 20px; color: #fff; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #00d4ff; font-size: 2em; }
        
        .companies-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .company-card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .company-card h2 { color: #00d4ff; margin-bottom: 15px; font-size: 1.3em; }
        
        .metric-group { margin-bottom: 15px; }
        .metric-group h4 { color: #ff6b6b; margin-bottom: 8px; font-size: 0.9em; }
        .metric-row { display: flex; justify-content: space-between; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 8px; margin-bottom: 5px; }
        .metric-label { color: #aaa; font-size: 0.85em; }
        .metric-value { font-weight: bold; }
        .target { color: #4ecdc4; }
        .actual { color: #ffe66d; }
        .achieved { color: #2ecc71; }
        .missed { color: #e74c3c; }
        
        .add-company { background: rgba(0,212,255,0.1); border: 2px dashed #00d4ff; border-radius: 15px; padding: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; min-height: 200px; transition: 0.3s; }
        .add-company:hover { background: rgba(0,212,255,0.2); }
        .add-company span { color: #00d4ff; font-size: 1.2em; }
        
        .comparison-section { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 25px; margin-bottom: 30px; }
        .comparison-section h2 { color: #00d4ff; margin-bottom: 20px; text-align: center; }
        
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .chart-container { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px; }
        
        .summary-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .summary-table th, .summary-table td { padding: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .summary-table th { background: rgba(0,212,255,0.2); color: #00d4ff; }
        .summary-table tr:nth-child(even) { background: rgba(255,255,255,0.02); }
        
        .btn { background: #00d4ff; color: #1a1a2e; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn:hover { background: #00b8e6; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        
        .controls { text-align: center; margin-bottom: 20px; }
        
        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
            .companies-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 مقارنة أداء الشركات</h1>
        
        <div class="controls">
            <button class="btn" onclick="exportData()">💾 تصدير البيانات</button>
            <button class="btn" onclick="resetData()">🔄 إعادة تعيين</button>
        </div>
        
        <div class="companies-grid" id="companiesGrid">
            <!-- Companies will be rendered here -->
        </div>
        
        <div class="comparison-section">
            <h2>📈 التحليل المقارن</h2>
            <div class="charts-grid">
                <div class="chart-container">
                    <canvas id="comparisonChart"></canvas>
                </div>
                <div class="chart-container">
                    <canvas id="achievementChart"></canvas>
                </div>
            </div>
            
            <table class="summary-table" id="summaryTable">
                <thead>
                    <tr>
                        <th>الشركة</th>
                        <th>الإيرادات</th>
                        <th>الأرباح</th>
                        <th>نمو الإيرادات</th>
                        <th>هامش الربح</th>
                        <th>نسبة الإنجاز</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        // Sample data - 4 companies
        let companies = [
            {
                id: 1,
                name: "شركة أ",
                metrics: {
                    revenue: { target: 1000000, actual: 1200000 },
                    profit: { target: 200000, actual: 250000 },
                    growth: { target: 15, actual: 20 },
                    margin: { target: 20, actual: 20.8 }
                }
            },
            {
                id: 2,
                name: "شركة ب",
                metrics: {
                    revenue: { target: 800000, actual: 750000 },
                    profit: { target: 150000, actual: 120000 },
                    growth: { target: 10, actual: 5 },
                    margin: { target: 18, actual: 16 }
                }
            },
            {
                id: 3,
                name: "شركة ج",
                metrics: {
                    revenue: { target: 1500000, actual: 1400000 },
                    profit: { target: 300000, actual: 280000 },
                    growth: { target: 20, actual: 15 },
                    margin: { target: 20, actual: 20 }
                }
            },
            {
                id: 4,
                name: "شركة د",
                metrics: {
                    revenue: { target: 500000, actual: 600000 },
                    profit: { target: 80000, actual: 110000 },
                    growth: { target: 8, actual: 20 },
                    margin: { target: 16, actual: 18.3 }
                }
            }
        ];

        function formatNumber(num) {
            return num.toLocaleString('ar-SA');
        }

        function calculateAchievement(actual, target) {
            return ((actual / target) * 100).toFixed(1);
        }

        function getStatusClass(actual, target) {
            const ratio = actual / target;
            if (ratio >= 1) return 'achieved';
            if (ratio >= 0.8) return '';
            return 'missed';
        }

        function renderCompanies() {
            const grid = document.getElementById('companiesGrid');
            grid.innerHTML = companies.map(company => `
                <div class="company-card">
                    <h2>🏢 ${company.name}</h2>
                    
                    <div class="metric-group">
                        <h4>💰 الإيرادات</h4>
                        <div class="metric-row">
                            <span class="metric-label">الهدف</span>
                            <span class="metric-value target">${formatNumber(company.metrics.revenue.target)}</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label"> الفعلي</span>
                            <span class="metric-value actual">${formatNumber(company.metrics.revenue.actual)}</span>
                        </div>
                    </div>
                    
                    <div class="metric-group">
                        <h4>📈 الأرباح</h4>
                        <div class="metric-row">
                            <span class="metric-label">الهدف</span>
                            <span class="metric-value target">${formatNumber(company.metrics.profit.target)}</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label"> الفعلي</span>
                            <span class="metric-value actual">${formatNumber(company.metrics.profit.actual)}</span>
                        </div>
                    </div>
                    
                    <div class="metric-group">
                        <h4>📊 نمو الإيرادات (%)</h4>
                        <div class="metric-row">
                            <span class="metric-label">الهدف</span>
                            <span class="metric-value target">${company.metrics.growth.target}%</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label"> الفعلي</span>
                            <span class="metric-value ${getStatusClass(company.metrics.growth.actual, company.metrics.growth.target)}">${company.metrics.growth.actual}%</span>
                        </div>
                    </div>
                    
                    <div class="metric-group">
                        <h4>🔗 هامش الربح (%)</h4>
                        <div class="metric-row">
                            <span class="metric-label">الهدف</span>
                            <span class="metric-value target">${company.metrics.margin.target}%</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label"> الفعلي</span>
                            <span class="metric-value ${getStatusClass(company.metrics.margin.actual, company.metrics.margin.target)}">${company.metrics.margin.actual}%</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderSummaryTable() {
            const tbody = document.querySelector('#summaryTable tbody');
            tbody.innerHTML = companies.map(company => {
                const revenueAchievement = calculateAchievement(company.metrics.revenue.actual, company.metrics.revenue.target);
                const profitAchievement = calculateAchievement(company.metrics.profit.actual, company.metrics.profit.target);
                const growthAchievement = calculateAchievement(company.metrics.growth.actual, company.metrics.growth.target);
                const marginAchievement = calculateAchievement(company.metrics.margin.actual, company.metrics.margin.target);
                const overallAchievement = ((parseFloat(revenueAchievement) + parseFloat(profitAchievement) + parseFloat(growthAchievement) + parseFloat(marginAchievement)) / 4).toFixed(1);
                
                return `
                    <tr>
                        <td><strong>${company.name}</strong></td>
                        <td>${formatNumber(company.metrics.revenue.actual)}</td>
                        <td>${formatNumber(company.metrics.profit.actual)}</td>
                        <td>${company.metrics.growth.actual}%</td>
                        <td>${company.metrics.margin.actual}%</td>
                        <td style="color: ${parseFloat(overallAchievement) >= 100 ? '#2ecc71' : parseFloat(overallAchievement) >= 80 ? '#ffe66d' : '#e74c3c'}">
                            <strong>${overallAchievement}%</strong>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        let comparisonChart, achievementChart;

        function renderCharts() {
            const ctx1 = document.getElementById('comparisonChart').getContext('2d');
            const ctx2 = document.getElementById('achievementChart').getContext('2d');
            
            if (comparisonChart) comparisonChart.destroy();
            if (achievementChart) achievementChart.destroy();
            
            const labels = companies.map(c => c.name);
            const colors = ['#00d4ff', '#ff6b6b', '#4ecdc4', '#ffe66d'];
            
            // Comparison Chart
            comparisonChart = new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'الإيرادات (الهدف)',
                            data: companies.map(c => c.metrics.revenue.target),
                            backgroundColor: 'rgba(0, 212, 255, 0.3)',
                            borderColor: '#00d4ff',
                            borderWidth: 2
                        },
                        {
                            label: 'الإيرادات (الفعلي)',
                            data: companies.map(c => c.metrics.revenue.actual),
                            backgroundColor: 'rgba(255, 230, 109, 0.5)',
                            borderColor: '#ffe66d',
                            borderWidth: 2
                        },
                        {
                            label: 'الأرباح (الهدف)',
                            data: companies.map(c => c.metrics.profit.target),
                            backgroundColor: 'rgba(78, 205, 196, 0.3)',
                            borderColor: '#4ecdc4',
                            borderWidth: 2
                        },
                        {
                            label: 'الأرباح (الفعلي)',
                            data: companies.map(c => c.metrics.profit.actual),
                            backgroundColor: 'rgba(255, 107, 107, 0.3)',
                            borderColor: '#ff6b6b',
                            borderWidth: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        title: { display: true, text: 'مقارنة الإيرادات والأرباح', color: '#fff', font: { size: 16 } },
                        legend: { labels: { color: '#fff' } }
                    },
                    scales: {
                        x: { ticks: { color: '#fff' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        y: { ticks: { color: '#fff' }, grid: { color: 'rgba(255,255,255,0.1)' } }
                    }
                }
            });
            
            // Achievement Chart
            achievementChart = new Chart(ctx2, {
                type: 'radar',
                data: {
                    labels: ['نمو الإيرادات', 'هامش الربح', 'الأرباح', 'الإيرادات', 'الأداء العام'],
                    datasets: companies.map((c, i) => ({
                        label: c.name,
                        data: [
                            calculateAchievement(c.metrics.growth.actual, c.metrics.growth.target),
                            calculateAchievement(c.metrics.margin.actual, c.metrics.margin.target),
                            calculateAchievement(c.metrics.profit.actual, c.metrics.profit.target),
                            calculateAchievement(c.metrics.revenue.actual, c.metrics.revenue.target),
                            (parseFloat(calculateAchievement(c.metrics.growth.actual, c.metrics.growth.target)) + 
                             parseFloat(calculateAchievement(c.metrics.margin.actual, c.metrics.margin.target)) + 
                             parseFloat(calculateAchievement(c.metrics.profit.actual, c.metrics.profit.target)) + 
                             parseFloat(calculateAchievement(c.metrics.revenue.actual, c.metrics.revenue.target))) / 4
                        ],
                        backgroundColor: colors[i] + '40',
                        borderColor: colors[i],
                        borderWidth: 2,
                        pointBackgroundColor: colors[i]
                    }))
                },
                options: {
                    responsive: true,
                    plugins: {
                        title: { display: true, text: 'نسبة الإنجاز (%)', color: '#fff', font: { size: 16 } },
                        legend: { labels: { color: '#fff' } }
                    },
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.2)' },
                            grid: { color: 'rgba(255,255,255,0.2)' },
                            pointLabels: { color: '#fff', font: { size: 12 } },
                            ticks: { color: '#fff', backdropColor: 'transparent' },
                            suggestedMin: 0,
                            suggestedMax: 150
                        }
                    }
                }
            });
        }

        function exportData() {
            const data = JSON.stringify(companies, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'company_comparison.json';
            a.click();
        }

        function resetData() {
            localStorage.removeItem('companyComparison');
            location.reload();
        }

        // Initialize
        renderCompanies();
        renderSummaryTable();
        renderCharts();
    </script>
</body>
</html>
